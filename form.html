<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form</title>

<style>

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #ffffff);
    margin: 0;
}

/* ANIMASI */
@keyframes fadeSlideUp {
    from { opacity:0; transform:translateY(30px);}
    to { opacity:1; transform:translateY(0);}
}

/* NAVBAR */
nav{
    background:#1f2937;
    padding:15px;
    text-align:center;
    animation: fadeSlideUp 0.6s ease;
}

nav a{
    color:white;
    margin:0 12px;
    text-decoration:none;
}

/* CONTAINER */
.container{
    max-width:400px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    animation: fadeSlideUp 0.8s ease;
}

/* INPUT */
input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    opacity:0;
    animation: fadeSlideUp 0.6s forwards;
}

/* DELAY ANIMASI */
input:nth-child(2){animation-delay:0.2s;}
input:nth-child(3){animation-delay:0.4s;}
textarea{animation-delay:0.6s;}

/* BUTTON */
button{
    background:#1f2937;
    color:white;
    padding:10px;
    border:none;
    cursor:pointer;
    opacity:0;
    animation: fadeSlideUp 0.6s forwards;
    animation-delay:0.8s;
}

button:hover{
    background:#111827;
}

</style>

</head>

<body>

<nav>

<a href="pendidikan.html">Pendidikan</a>
<a href="skil.html">Skill</a>
<a href="layout.html">Layout</a>

<a href="kalkulator.html">Kalkulator</a>
</nav>

<h2>Form Data Diri</h2>

<input type="text" placeholder="Nama">
<input type="email" placeholder="Email">
<textarea placeholder="Alamat"></textarea>

<button>Kirim</button>

</div>

</body>
</html>
